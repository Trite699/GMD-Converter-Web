<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ASRC Converter</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: sans-serif;
  background: #111;
  color: #eee;
  padding: 20px;
}

.wrap {
  max-width: 600px;
  margin: auto;
}

.card {
  background: #1b1b1b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

h2 { margin-bottom: 10px; }
h3 { margin: 10px 0; }

input, select, button {
  width: 100%;
  margin-top: 8px;
  padding: 8px;
  border-radius: 6px;
  border: none;
}

button {
  background: #3a86ff;
  color: white;
  cursor: pointer;
}

canvas {
  width: 100%;
  height: 120px;
  background: #000;
  border-radius: 6px;
  margin-top: 10px;
}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
  <h2>ASRC Converter</h2>

  <input type="file" id="fileInput" accept=".wav,.asrc">

  <select id="mode">
    <option value="wav2asrc">WAV → ASRC</option>
    <option value="asrc2wav">ASRC → WAV</option>
  </select>

  <button onclick="convert()">Convert</button>
</div>

<div class="card">
  <h3>Preview</h3>
  <audio id="audioPlayer" controls></audio>
  <canvas id="waveform"></canvas>
</div>

<div class="card">
  <h3>Loop Points</h3>

  <label>Loop Start</label>
  <input type="number" id="loopStart" value="0">

  <label>Loop End</label>
  <input type="number" id="loopEnd" value="0">

  <button onclick="applyLoopUI()">Apply Loop</button>
</div>

</div>

<script>
// ================================
// GLOBAL STATE
// ================================
let currentBuffer = null;
let currentSamples = null;

// ================================
// FILE LOAD
// ================================
document.getElementById("fileInput").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const buffer = await file.arrayBuffer();
    currentBuffer = buffer;

    if (file.name.endsWith(".wav")) {
        const audio = await decodeWav(buffer);
        currentSamples = audio.getChannelData(0);

        drawWaveform(currentSamples);
        previewAudio(buffer);
    }
});

// ================================
// AUDIO PREVIEW
// ================================
function previewAudio(buffer) {
    const blob = new Blob([buffer], { type: "audio/wav" });
    const url = URL.createObjectURL(blob);
    document.getElementById("audioPlayer").src = url;
}

// ================================
// WAV DECODE
// ================================
async function decodeWav(buffer) {
    const ctx = new AudioContext();
    return await ctx.decodeAudioData(buffer.slice(0));
}

// ================================
// WAVEFORM
// ================================
function drawWaveform(samples) {
    const canvas = document.getElementById("waveform");
    const ctx = canvas.getContext("2d");

    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const step = Math.ceil(samples.length / canvas.width);
    const amp = canvas.height / 2;

    for (let i = 0; i < canvas.width; i++) {
        let min = 1.0;
        let max = -1.0;

        for (let j = 0; j < step; j++) {
            const val = samples[(i * step) + j] || 0;
            if (val < min) min = val;
            if (val > max) max = val;
        }

        ctx.fillRect(i, (1 + min) * amp, 1, Math.max(1, (max - min) * amp));
    }
}

// ================================
// LOOP UI APPLY
// ================================
function applyLoopUI() {
    const start = parseInt(document.getElementById("loopStart").value);
    const end = parseInt(document.getElementById("loopEnd").value);

    console.log("Loop set:", start, end);

    // purely visual for now — actual injection happens in convert()
}

// ================================
// CONVERT
// ================================
async function convert() {
    if (!currentBuffer) return alert("No file loaded");

    const mode = document.getElementById("mode").value;

    const loopStart = parseInt(document.getElementById("loopStart").value);
    const loopEnd = parseInt(document.getElementById("loopEnd").value);

    let output;

    if (mode === "wav2asrc") {
        // TODO: Replace with your encoder
        output = fakeEncode(currentBuffer);

        output = applyLoopToASRC(output, loopStart, loopEnd);

        download(output, "output.asrc");
    }

    if (mode === "asrc2wav") {
        // TODO: Replace with your decoder
        const wav = fakeDecode(currentBuffer);

        previewAudio(wav);
        download(wav, "output.wav");
    }
}

// ================================
// LOOP INJECTION
// ================================
function applyLoopToASRC(buffer, start, end) {
    const view = new DataView(buffer);

    // ⚠️ YOU MUST FIX OFFSETS FOR REAL ASRC
    view.setUint32(0x10, start, true);
    view.setUint32(0x14, end, true);

    return buffer;
}

// ================================
// DOWNLOAD
// ================================
function download(buffer, name) {
    const blob = new Blob([buffer]);
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = name;
    a.click();
}

// ================================
// PLACEHOLDER (REPLACE THESE)
// ================================
function fakeEncode(buf) {
    return buf;
}

function fakeDecode(buf) {
    return buf;
}
</script>

</body>
</html>
